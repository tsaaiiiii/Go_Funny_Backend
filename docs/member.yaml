# @swagger
# Member endpoints
/members/{tripId}:
  get:
    tags: [Member]
    summary: 取得旅程成員列表
    parameters:
      - in: path
        name: tripId
        required: true
        schema:
          type: string
    responses:
      200:
        description: 成員列表

/members/{tripId}/{memberId}:
  delete:
    tags: [Member]
    summary: 刪除旅程成員
    parameters:
      - in: path
        name: tripId
        required: true
        schema:
          type: string
      - in: path
        name: memberId
        required: true
        schema:
          type: string
    responses:
      204:
        description: 刪除成功
      400:
        description: 刪除失敗
