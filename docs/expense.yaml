# @swagger
# Expense endpoints
/expenses/{tripId}:
  post:
    tags: [Expense]
    summary: 新增費用
    parameters:
      - in: path
        name: tripId
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [title, amount, date, splitType, payerMembershipId]
            properties:
              title:
                type: string
                example: 午餐
              amount:
                type: number
                example: 1200
              date:
                type: string
                format: date
                example: "2026-05-02"
              splitType:
                type: string
                example: EQUAL
              payerMembershipId:
                type: string
              note:
                type: string
    responses:
      201:
        description: 新增成功
      400:
        description: 新增失敗
  get:
    tags: [Expense]
    summary: 取得費用列表
    parameters:
      - in: path
        name: tripId
        required: true
        schema:
          type: string
    responses:
      200:
        description: 費用列表

/expenses/{tripId}/{expenseId}:
  delete:
    tags: [Expense]
    summary: 刪除費用
    parameters:
      - in: path
        name: tripId
        required: true
        schema:
          type: string
      - in: path
        name: expenseId
        required: true
        schema:
          type: string
    responses:
      204:
        description: 刪除成功
      400:
        description: 刪除失敗
