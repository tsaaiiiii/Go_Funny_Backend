# @swagger
# Invitation endpoints
/invitations/{tripId}:
  post:
    tags: [Invitation]
    summary: 建立邀請連結
    parameters:
      - in: path
        name: tripId
        required: true
        schema:
          type: string
    responses:
      201:
        description: 建立成功
      400:
        description: 建立失敗

/invitations/{token}:
  get:
    tags: [Invitation]
    summary: 透過 token 取得邀請資訊
    security: []
    parameters:
      - in: path
        name: token
        required: true
        schema:
          type: string
    responses:
      200:
        description: 邀請資訊
      404:
        description: 邀請不存在

/invitations/{token}/accept:
  post:
    tags: [Invitation]
    summary: 接受邀請
    parameters:
      - in: path
        name: token
        required: true
        schema:
          type: string
    responses:
      201:
        description: 接受成功
      400:
        description: 接受失敗
      404:
        description: 邀請不存在
