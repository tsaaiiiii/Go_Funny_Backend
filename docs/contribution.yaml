# @swagger
# Contribution endpoints
/contributions/{tripId}:
  post:
    tags: [Contribution]
    summary: 新增公費
    parameters:
      - in: path
        name: tripId
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [membershipId, amount, date]
            properties:
              membershipId:
                type: string
              amount:
                type: number
                example: 500
              date:
                type: string
                format: date
                example: "2026-05-01"
    responses:
      201:
        description: 新增成功
      400:
        description: 新增失敗
  get:
    tags: [Contribution]
    summary: 取得公費列表
    parameters:
      - in: path
        name: tripId
        required: true
        schema:
          type: string
    responses:
      200:
        description: 公費列表
